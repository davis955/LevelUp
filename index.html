<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LevelUp</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>⚽ LevelUp</h1>

<div class="card">
<h2>Daily Goals</h2>
<label><input type="checkbox"> Soccer Practice</label><br>
<label><input type="checkbox"> Workout</label><br>
<label><input type="checkbox"> Drink Water</label><br>
<label><input type="checkbox"> Skincare</label><br>
<label><input type="checkbox"> Hair Care</label>
</div>

<div class="card">
<h2>Soccer</h2>
<ul>
<li>100 Ball Touches</li>
<li>20 Shots Each Foot</li>
<li>10 Minute Dribbling Drill</li>
</ul>
</div>

<div class="card">
<h2>Fitness</h2>
<ul>
<li>20 Pushups</li>
<li>20 Squats</li>
<li>1 Minute Plank</li>
</ul>
</div>

<div class="card">
<h2>Grooming</h2>
<ul>
<li>Wash Face</li>
<li>Brush Teeth</li>
<li>Hair Styling</li>
<li>Clean Outfit</li>
</ul>
</div>

<script src="script.js"></script>
</body>
</html>
